<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid 02</title>

    <style>
        .container {
            border: 3px solid blue;
            
            display: grid;
            grid-template: repeat(3, 1fr) / repeat(3, 1fr); 
            /* grid-template: repeat(3, 1fr) / repeat(3, 1fr):

            - "1fr": 1 Fração do grid explícito. Basicamente, são 3 linhas de 1fr cada, então a altura total do container é dividida em 3 e distribuída entre os itens. O mesmo para as colunas, porém com a largura.

            - Substitui a declaração do grid-template-rows/columns, como um shorthand. Primeiro parâmetro: Nº linhas (rows); Segundo parâmetro: Nº Colunas.

            - repeat(3, 100px): Função que simplifica a declaração do número de linhas e colunas. 1º Parâmtro: Nº linhas/colunas; 2º Parâmetro: Tamanho das linhas/colunas. */

            grid-auto-flow: row; /* Quando novas linhas forem criadas, dependendo da configuração passada ele irá fazer a quebra da linha de forma diferente, quase como um "wrap". Row: Quebra a linha e posiciona o elemento seguindo o fludo de um row, um à direita do outro e quando acaba o espaço, vai para baixo. Column: Psiciona os elementos um abaixo do outro, e quando acaba o espaço joga ele para a direita. */

            grid-auto-rows: 80px; /* Quando novas linhas forem criadas, elas terão automaticamente 80px. */

            /* grid-auto-columns: 120px; */

            gap: 10px; /* Espaçamento entre as linhas e as colunas, quase como um margin */

            place-items: normal normal; /* Shorthand para o align/justify-items. 1º Parâmetro: Align; 2º Parâmetro: Justify. */

            place-content: normal normal; /* Shorthand para o align/justify-content. 1º Parâmetro: Align; 2º Parâmetro: Justify. */
        }   

        .item {
            border: 3px solid red;
            padding: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item">A</div>
        <div class="item">B</div>
        <div class="item">C</div>
        <div class="item">D</div>
        <div class="item">E</div>
        <div class="item">F</div>
        <div class="item">G</div>
        <div class="item">H</div>
        <div class="item">I</div>
        <div class="item">J</div>
    </div>
</body>
</html>
