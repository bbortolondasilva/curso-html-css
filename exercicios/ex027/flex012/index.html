<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible Box</title>

    <style>
        .conteiner {
            background-color: lightsalmon;
            padding: 20px;

            display: flex;
            flex-flow: row nowrap;
            align-content: flex-start;
        }

        .item {
            text-align: center;
            border: 1px solid black;
            background-color: lightblue;
        }

        div#i1 {
            flex: 1 1 200px;
            /* ShortHand Flex Grow - Shrink - Basis: flex
            - Ao utilizar flex é possível alterar as propriedades de flex grow, shrink e basis sem ter que declará-las separadamente.
            
            - Ordem de utilização: flex: (GROW) (SHRINK) (BASIS) 
            
            === Exemplos de utilização ===
            
            - flex: 0 1 auto /(ou) flex: initial == Configuração padrão;
            
            - flex: 0 0 auto /(ou) flex: none == Deixar os elementos não flexíveis, dependendo apenas do tamanho do conteúdo;

            - flex: 1 1 auto /(ou) flex: auto == Deixar os elementos totalmente flexíveis, podendo aumentar e diminuir limitando-se ao tamanho do conteúdo;
            
            flex: (valor grow apenas) /(ou) flex: (valor grow) 1 auto == Apenas o grow é definido, os outros atributos recebem o valor padrão.*/
        }

        div#i2 {
            flex: 1 1 200px;
        }

        div#i3 {
            flex: 1 1 200px;
        }
    </style>
</head>
<body>
    <div class="conteiner">
        <div class="item" id="i1">A</div>
        <div class="item" id="i2">B</div>
        <div class="item" id="i3">C</div>
    </div>
</body>
</html>
